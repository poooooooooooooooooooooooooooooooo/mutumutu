  OPTIONS.forEach((opt, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option' + (answers[currentIndex] === idx ? ' selected' : '');
    btn.textContent = opt.label;
    btn.addEventListener('click', () => {
      answers[currentIndex] = idx;
      const clickedQuestionIndex = currentIndex; // クリックした問題の番号を記憶
      renderQuestion();
      
      // 自動で次へ進む処理（連打バグ防止のため、同じ問題にいる場合のみ進む）
      setTimeout(() => {
        if (currentIndex === clickedQuestionIndex) {
          if (currentIndex < QUESTIONS.length - 1) {
            currentIndex++;
            renderQuestion();
          } else {
            updateNavButtons();
          }
        }
      }, 300);
    });
    optionsEl.appendChild(btn);
  });
  updateNavButtons();
}

function updateNavButtons() {
  document.getElementById('prev-btn').disabled = currentIndex === 0;
  const nextBtn = document.getElementById('next-btn');
  if (currentIndex === QUESTIONS.length - 1) {
    nextBtn.textContent = '結果を見る 🎉';
    nextBtn.disabled = answers[currentIndex] === null;
  } else {
    nextBtn.textContent = '次へ →';
    nextBtn.disabled = answers[currentIndex] === null;
  }
}

function calculateResult() {
  let total = 0;
  const categoryScores = { thought: 0, reaction: 0, behavior: 0, fantasy: 0, honesty: 0 };
  const categoryCounts = { thought: 0, reaction: 0, behavior: 0, fantasy: 0, honesty: 0 };

  QUESTIONS.forEach((q, i) => {
    // もし未回答(null)の問題があってもエラーにならないように、0点として処理する安全策を追加
    const ans = answers[i];
    const score = ans !== null ? OPTIONS[ans].score : 0; 
    
    total += score;
    categoryScores[q.c] += score;
    categoryCounts[q.c]++;
  });

  const result = RESULTS.find(r => total >= r.min && total <= r.max);
  return { total, categoryScores, categoryCounts, result };
}

function showResult() {
  const { total, categoryScores, categoryCounts, result } = calculateResult();
  
  // 万が一resultが見つからなかった場合のエラー防止
  if (!result) return;

  document.getElementById('score-value').textContent = total;
  document.getElementById('result-title').textContent = result.title;
  document.getElementById('result-rank').textContent = result.rank;
  document.getElementById('result-description').textContent = result.desc;

  const catContainer = document.getElementById('category-scores');
  catContainer.innerHTML = '';
  Object.keys(categoryScores).forEach(key => {
    const max = categoryCounts[key] * 4;
    const score = categoryScores[key];
    const percent = Math.round((score / max) * 100);
    const row = document.createElement('div');
    row.className = 'category-row';
    row.innerHTML = `
      <div class="category-label">
        <span>${CATEGORY_NAMES[key]}</span>
        <span>${score} / ${max} (${percent}%)</span>
      </div>
      <div class="category-bar">
        <div class="category-fill" style="width: ${percent}%"></div>
      </div>
    `;
    catContainer.appendChild(row);
  });

  show(resultScreen);
}

/* イベント設定 */
document.getElementById('start-btn').addEventListener('click', () => {
  currentIndex = 0;
  answers = new Array(QUESTIONS.length).fill(null);
  renderQuestion();
  show(quizScreen);
});

document.getElementById('prev-btn').addEventListener('click', () => {
  if (currentIndex > 0) { currentIndex--; renderQuestion(); }
});

document.getElementById('next-btn').addEventListener('click', () => {
  if (answers[currentIndex] === null) return;
  if (currentIndex < QUESTIONS.length - 1) {
    currentIndex++;
    renderQuestion();
  } else {
    showResult();
  }
});

document.getElementById('retry-btn').addEventListener('click', () => {
  show(startScreen);
});

document.getElementById('share-twitter').addEventListener('click', () => {
  const { total, result } = calculateResult();
  if(!result) return;
  const text = `私のむっつり度は ${total}点 / 400点\n結果: ${result.title} (ランク${result.rank})\n#むっつり度診断`;
  const url = `https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
});

document.getElementById('copy-result').addEventListener('click', () => {
  const { total, result } = calculateResult();
  if(!result) return;
  const text = `【むっつり度診断】\nスコア: ${total} / 400点\n結果: ${result.title}\nランク: ${result.rank}\n\n${result.desc}`;
  navigator.clipboard.writeText(text).then(() => {
    alert('結果をコピーしました！');
  }).catch(() => {
    alert('コピーに失敗しました');
  });
});
</script>
